<div class="imports-wrapper">

  <div class="imports-header">

    <h2>Histórico de Importações</h2>

    <span>{{ imports.length }} registros encontrados</span>

  </div>

  <div
    class="loading-container"
    *ngIf="isLoading"
  >
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <table
    mat-table
    [dataSource]="imports"
    *ngIf="!isLoading"
  >

    <ng-container matColumnDef="identifier">
      <th mat-header-cell *matHeaderCellDef>Identificador</th>
      <td mat-cell *matCellDef="let item">{{ item.identifier }}</td>
    </ng-container>

    <ng-container matColumnDef="file_name">
      <th mat-header-cell *matHeaderCellDef>Arquivo</th>
      <td mat-cell *matCellDef="let item">{{ item.file_name }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let item">
        <span class="status success">{{ item.status }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="total_rows">
      <th mat-header-cell *matHeaderCellDef>Linhas</th>
      <td mat-cell *matCellDef="let item">{{ item.total_rows }}</td>
    </ng-container>

    <ng-container matColumnDef="created_at">
      <th mat-header-cell *matHeaderCellDef>Data</th>
      <td mat-cell *matCellDef="let item">
        {{ item.created_at | date:'dd/MM/yyyy HH:mm' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let item">
        <button
          mat-icon-button
          matTooltip="Visualizar dashboard"
          (click)="navigateToDashboard(item.id)"
        >
          <mat-icon>visibility</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

</div>
