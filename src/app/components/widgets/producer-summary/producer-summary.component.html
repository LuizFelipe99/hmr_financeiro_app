<div class="widget-card">

  <div class="widget-header">

    <div>

      <h2>Resumo por Produtor</h2>

      <p>
        Consolidado financeiro por produtores
      </p>

    </div>

    <div class="header-total">

      <span>Produtores</span>

      <strong>
        {{ totalRecords }}
      </strong>

    </div>

  </div>

  <div
    class="loading-container"
    *ngIf="isLoading"
  >
    Carregando...
  </div>

  <div
    class="producers-grid"
    *ngIf="!isLoading"
  >

    <div
      class="producer-item"
      *ngFor="let item of producers"
    >

      <div class="producer-name">
        {{ item.produtor }}
      </div>

      <div class="producer-metrics">

        <div class="metric positive">

          <span>Receb.</span>

          <strong>
            {{ toCurrency(item.recebimentos) }}
          </strong>

        </div>

        <div class="metric negative">

          <span>Pag.</span>

          <strong>
            {{ toCurrency(item.pagamentos) }}
          </strong>

        </div>

        <div class="metric liquido">

          <span>Líquido</span>

          <strong>
            {{ toCurrency(item.liquido) }}
          </strong>

        </div>

        <div class="metric registros">

          <span>Registros</span>

          <strong>
            {{ item.total_registros }}
          </strong>

        </div>

      </div>

    </div>

  </div>

</div>
