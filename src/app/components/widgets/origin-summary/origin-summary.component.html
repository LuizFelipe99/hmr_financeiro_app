<div class="widget-card">

  <div class="widget-header">

    <div>

      <h2>Resumo por Origem</h2>

      <p>
        Consolidado financeiro agrupado por origem
      </p>

    </div>

  </div>

  <div
    class="loading-container"
    *ngIf="isLoading"
  >
    Carregando...
  </div>

  <div
    class="origins-grid"
    *ngIf="!isLoading"
  >

    <div
      class="origin-item"
      *ngFor="let item of origins"
    >

      <div class="origin-header">

        <div class="origin-name">
          {{ item.origem }}
        </div>

        <div class="origin-badge">
          {{ item.total_registros }}
          registros
        </div>

      </div>

      <div class="origin-metrics">

        <div class="metric positive">

          <span>Recebimentos</span>

          <strong>
            {{ toCurrency(item.recebimentos) }}
          </strong>

        </div>

        <div class="metric negative">

          <span>Pagamentos</span>

          <strong>
            {{ toCurrency(item.pagamentos) }}
          </strong>

        </div>

        <div class="metric liquido">

          <span>Líquido</span>

          <strong>
            {{ toCurrency(item.liquido) }}
          </strong>

        </div>

      </div>

    </div>

  </div>

</div>
