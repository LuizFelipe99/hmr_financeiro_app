<div class="widget-card">

  <div class="widget-header">

    <div>

      <h2>Evolução Financeira</h2>

      <p>
        Recebimentos, pagamentos e líquido por período
      </p>

    </div>

  </div>

  <div
    class="loading-container"
    *ngIf="isLoading"
  >
    Carregando gráfico...
  </div>

  <apx-chart
    *ngIf="!isLoading"
    [series]="chartOptions.series!"
    [chart]="chartOptions.chart!"
    [xaxis]="chartOptions.xaxis!"
    [stroke]="chartOptions.stroke!"
    [dataLabels]="chartOptions.dataLabels!"
    [tooltip]="chartOptions.tooltip!"
    [legend]="chartOptions.legend!"
    [title]="chartOptions.title!">
  </apx-chart>

  <div
    class="summary-table"
    *ngIf="summaryData.length > 0"
  >

    <table>

      <thead>

        <tr>
          <th>Data</th>
          <th>Recebimentos</th>
          <th>Pagamentos</th>
          <th>Líquido</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let item of summaryData">

          <td>
            {{ formatDate(item.data) }}
          </td>

          <td class="positive">
            {{ toCurrency(item.recebimentos) }}
          </td>

          <td class="negative">
            {{ toCurrency(item.pagamentos) }}
          </td>

          <td class="liquido">
            {{ toCurrency(item.liquido) }}
          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
