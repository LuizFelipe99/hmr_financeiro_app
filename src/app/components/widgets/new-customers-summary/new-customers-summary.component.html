<div class="customers-wrapper">

    <div class="customers-header">

        <div>

            <h2>Novos Clientes</h2>

            <p>
                Novas vendas identificadas na importação
            </p>

        </div>

        <div class="header-kpi">

            <span>Total Recebido</span>

            <strong>
                {{ toCurrency(totalGeral) }}
            </strong>

        </div>

    </div>

    <div class="loading-container" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <div class="table-container" *ngIf="!isLoading">

        <table mat-table [dataSource]="customers">

            <ng-container matColumnDef="descricao">

                <th mat-header-cell *matHeaderCellDef>
                    Cliente
                </th>

                <td mat-cell *matCellDef="let item">

                    <div class="customer-info">

                        <strong>
                            {{ item.descricao }}
                        </strong>

                    </div>

                </td>

            </ng-container>

            <ng-container matColumnDef="seguradora">

                <th mat-header-cell *matHeaderCellDef>
                    Seguradora
                </th>

                <td mat-cell *matCellDef="let item">

                    <span class="insurance-badge">
                        {{ item.seguradora }}
                    </span>

                </td>

            </ng-container>

            <ng-container matColumnDef="parcela">

                <th mat-header-cell *matHeaderCellDef>
                    Parcela
                </th>

                <td mat-cell *matCellDef="let item">
                    {{ item.parcela }}
                </td>

            </ng-container>

            <ng-container matColumnDef="valor_recebido">

                <th mat-header-cell *matHeaderCellDef>
                    Valor Recebido
                </th>

                <td mat-cell *matCellDef="let item" [ngClass]="{
  'positive-value': !isNegative(item.valor_recebido),
  'negative-value': isNegative(item.valor_recebido)
}">

                    {{ toCurrency(item.valor_recebido) }}

                </td>

            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>

    </div>

</div>
