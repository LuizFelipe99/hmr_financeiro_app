<div class="container">
  <h1>Importação de Usuários via CSV</h1>

  <div class="upload-section">
    <button mat-raised-button color="primary" (click)="fileInput.click()">
      Selecionar arquivo CSV
    </button>
    <input #fileInput type="file" accept=".csv" hidden (change)="onFileSelected($event)" />
  </div>

  <mat-progress-bar *ngIf="isUploading" mode="indeterminate"></mat-progress-bar>

  <table mat-table [dataSource]="importedUsers" *ngIf="importedUsers.length > 0">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let user">{{ user.name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>E-mail</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>

    <ng-container matColumnDef="nickname">
      <th mat-header-cell *matHeaderCellDef>Apelido</th>
      <td mat-cell *matCellDef="let user">{{ user.nickname }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
